  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

r, clarity & performance */\n  --secondary: 188 71% 36%; /* @kind color */\n  --secondary-foreground: 0 0% 100%; /* @kind color */\n\n  /* Gold #C89130 — structural accent, used with economy */\n  --accent: 38 61% 49%; /* @kind color */\n  --accent-foreground: 213 66% 13%; /* @kind color */\n\n  /* Off-white linen #F4F2ED — light field */\n  --background: 43 25% 94%; /* @kind color */\n  --foreground: 213 66% 13%; /* @kind color */\n\n  --card: 0 0% 100%; /* @kind color */\n  --card-foreground: 213 66% 13%; /* @kind color */\n  --popover: 0 0% 100%; /* @kind color */\n  --popover-foreground: 213 66% 13%; /* @kind color */\n\n  --muted: 43 15% 90%; /* @kind color */\n  --muted-foreground: 213 30% 45%; /* @kind color */\n\n  --success: 140 45% 40%; /* @kind color */\n  --success-foreground: 0 0% 100%; /* @kind color */\n  --destructive: 0 84% 60%; /* @kind color */\n  --destructive-foreground: 43 25% 94%; /* @kind color */\n\n  --border: 213 20% 85%; /* @kind color */\n  --input: 213 20% 85%; /* @kind color */\n  --ring: 188 71% 36%; /* @kind color */\n\n  /* ---- Convenience hex aliases (for non-HSL use) ---- */\n  --navy: #0B1E35;\n  --navy-700: #14304f;\n  --teal: #1A8A9C;\n  --teal-bright: #28a7bb;\n  --gold: #C89130;\n  --gold-bright: #dba744;\n  --linen: #F4F2ED;\n  --linen-deep: #e9e5da;\n  --ink: #0B1E35;\n  --paper: #ffffff;\n\n  /* ---- Radius ---- */\n  --radius: 0.75rem;\n  --radius-lg: 0.75rem;\n  --radius-md: 0.5rem;\n  --radius-sm: 0.375rem;\n\n  /* ---- Type families ---- */\n  --font-sans: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-display: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;\n  --font-label: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif; /* caps labels */\n\n  /* ---- Type scale (Meridian hierarchy, sans-only) ---- */\n  --text-display: clamp(2.75rem, 5.5vw, 4.5rem);   /* monuments */\n  --text-h1: clamp(2rem, 3.5vw, 3rem);\n  --text-h2: clamp(1.5rem, 2.4vw, 2rem);\n  --text-h3: 1.375rem;\n  --text-lg: 1.125rem;\n  --text-body: 1rem;\n  --text-sm: 0.875rem;\n  --text-label: 0.6875rem;   /* caps micro-labels */\n\n  /* ---- Gradients ---- */\n  --gradient-primary: linear-gradient(135deg, hsl(213 66% 13%) 0%, hsl(213 55% 22%) 100%); /* @kind color */\n  --gradient-accent: linear-gradient(135deg, hsl(38 61% 49%) 0%, hsl(38 70% 58%) 100%); /* @kind color */\n  --gradient-secondary: linear-gradient(135deg, hsl(188 71% 36%) 0%, hsl(188 65% 45%) 100%); /* @kind color */\n  --gradient-hero: linear-gradient(180deg, hsl(43 25% 94%) 0%, hsl(43 20% 90%) 100%); /* @kind color */\n\n  /* ---- Shadows (soft, navy-tinted) ---- */\n  --shadow-soft: 0 4px 20px -4px hsl(213 66% 13% / 0.08);\n  --shadow-medium: 0 8px 30px -6px hsl(213 66% 13% / 0.12);\n  --shadow-elegant: 0 10px 40px -10px hsl(213 66% 13% / 0.15);\n  --shadow-glow: 0 0 40px hsl(38 61% 49% / 0.25);\n  --shadow-glow-teal: 0 0 40px hsl(188 71% 36% / 0.2);\n\n  /* ---- Spacing rhythm ---- */\n  --space-1: 0.25rem;\n  --space-2: 0.5rem;\n  --space-3: 0.75rem;\n  --space-4: 1rem;\n  --space-6: 1.5rem;\n  --space-8: 2rem;\n  --space-12: 3rem;\n  --space-16: 4rem;\n  --space-24: 6rem;\n}\n\n/* ============================================================\n   BASE\n   ============================================================ */\n*,\n*::before,\n*::after { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  background-color: hsl(var(--background));\n  color: hsl(var(--foreground));\n  font-family: var(--font-sans);\n  font-size: var(--text-body);\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n@media (prefers-reduced-motion: reduce) {\n  html { scroll-behavior: auto; }\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n\n/* ---- Display / headings: sans, tight, monumental ---- */\n.cv-display,\n.cv-h1, .cv-h2, .cv-h3 {\n  font-family: var(--font-display);\n  color: hsl(var(--foreground));\n  font-weight: 800;\n  letter-spacing: -0.03em;\n  line-height: 1.02;\n  margin: 0;\n  text-wrap: balance;\n}\n.cv-display { font-size: var(--text-display); }\n.cv-h1 { font-size: var(--text-h1); letter-spacing: -0.025em; line-height: 1.05; }\n.cv-h2 { font-size: var(--text-h2); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }\n.cv-h3 { font-size: var(--text-h3); font-weight: 700; letter-spacing: -0.015em; line-height: 1.2; }\n\n.cv-lead {\n  font-size: var(--text-lg);\n  line-height: 1.55;\n  color: hsl(var(--muted-foreground));\n  font-weight: 400;\n}\n\n/* ---- Precision label: Jakarta caps micro-label ---- */\n.cv-label {\n  font-family: var(--font-label);\n  font-size: var(--text-label);\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: hsl(var(--secondary));\n}\n\n/* ---- Gold structural hairline rule ---- */\n.cv-rule {\n  display: inline-block;\n  width: 2.5rem;\n  height: 2px;\n  background: hsl(var(--accent));\n  vertical-align: middle;\n}\n.cv-rule--vertical {\n  width: 2px;\n  height: 1.5rem;\n}\n\n/* ============================================================\n   UTILITIES\n   ============================================================ */\n.cv-bg-navy { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }\n.cv-bg-linen { background: hsl(var(--background)); color: hsl(var(--foreground)); }\n.cv-bg-gradient-primary { background-image: var(--gradient-primary); }\n.cv-bg-gradient-accent { background-image: var(--gradient-accent); }\n.cv-bg-gradient-hero { background-image: var(--gradient-hero); }\n\n.cv-text-teal { color: hsl(var(--secondary)); }\n.cv-text-gold { color: hsl(var(--accent)); }\n.cv-text-navy { color: hsl(var(--primary)); }\n.cv-text-muted { color: hsl(var(--muted-foreground)); }\n\n.cv-text-gradient {\n  background-image: var(--gradient-accent);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n.cv-shadow-soft { box-shadow: var(--shadow-soft); }\n.cv-shadow-medium { box-shadow: var(--shadow-medium); }\n.cv-shadow-elegant { box-shadow: var(--shadow-elegant); }\n.cv-shadow-glow { box-shadow: var(--shadow-glow); }\n\n.cv-card {\n  background: hsl(var(--card));\n  color: hsl(var(--card-foreground));\n  border: 1px solid hsl(var(--border));\n  border-radius: var(--radius);\n  box-shadow: var(--shadow-soft);\n}\n\n/* ============================================================\n   COMPONENT: Button (.cv-btn)\n   ============================================================ */\n.cv-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 0.5rem;\n  white-space: nowrap;\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--text-sm);\n  line-height: 1;\n  border: 0;\n  border-radius: var(--radius-lg);\n  cursor: pointer;\n  text-decoration: none;\n  transition: background-color .25s ease, box-shadow .25s ease, color .25s ease, transform .15s ease, border-color .25s ease;\n}\n.cv-btn:focus-visible {\n  outline: none;\n  box-shadow: 0 0 0 2px hsl(var(--background)), 0 0 0 4px hsl(var(--ring));\n}\n.cv-btn:disabled { opacity: .5; pointer-events: none; }\n\n/* sizes */\n.cv-btn--md { height: 2.75rem; padding: 0 1.5rem; }\n.cv-btn--sm { height: 2.25rem; padding: 0 1rem; border-radius: var(--radius-md); font-size: 0.8125rem; }\n.cv-btn--lg { height: 3.5rem; padding: 0 2rem; font-size: var(--text-body); border-radius: var(--radius-lg); }\n.cv-btn--icon { height: 2.75rem; width: 2.75rem; padding: 0; }\n\n/* variants */\n.cv-btn--primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); box-shadow: var(--shadow-soft); }\n.cv-btn--primary:hover { background: hsl(var(--primary) / .9); box-shadow: var(--shadow-medium); }\n\n.cv-btn--secondary { background: hsl(var(--secondary)); color: hsl(var(--secondary-foreground)); box-shadow: var(--shadow-soft); }\n.cv-btn--secondary:hover { background: hsl(var(--secondary) / .85); }\n\n.cv-btn--outline { background: transparent; color: hsl(var(--primary)); border: 2px solid hsl(var(--primary)); }\n.cv-btn--outline:hover { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }\n\n.cv-btn--ghost { background: transparent; color: hsl(var(--foreground)); }\n.cv-btn--ghost:hover { background: hsl(var(--muted)); }\n\n.cv-btn--hero { background-image: var(--gradient-accent); color: hsl(var(--accent-foreground)); box-shadow: var(--shadow-medium); }\n.cv-btn--hero:hover { box-shadow: var(--shadow-glow); transform: scale(1.02); }\n.cv-btn--hero:active { transform: scale(.98); }\n\n.cv-btn--hero-outline { background: transparent; color: hsl(var(--accent)); border: 2px solid hsl(var(--accent)); }\n.cv-btn--hero-outline:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }\n\n/* ============================================================\n   COMPONENT: Badge (.cv-badge)\n   ============================================================ */\n.cv-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.375rem;\n  font-family: var(--font-label);\n  font-size: 0.6875rem;\n  font-weight: 700;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  padding: 0.25rem 0.625rem;\n  border-radius: 999px;\n  border: 1px solid transparent;\n  line-height: 1.2;\n}\n.cv-badge--navy { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }\n.cv-badge--teal { background: hsl(var(--secondary)); color: hsl(var(--secondary-foreground)); }\n.cv-badge--gold { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }\n.cv-badge--success { background: hsl(var(--success)); color: hsl(var(--success-foreground)); }\n.cv-badge--outline { background: transparent; color: hsl(var(--foreground)); border-color: hsl(var(--border)); }\n.cv-badge--muted { background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); }\n\n/* ============================================================\n   COMPONENT: PrecisionLabel (.cv-plabel) — caps kicker\n   ============================================================ */\n.cv-plabel {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.75rem;\n  font-family: var(--font-label);\n  font-size: var(--text-label);\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: hsl(var(--secondary));\n}\n.cv-plabel__rule { width: 2rem; height: 2px; background: hsl(var(--accent)); flex: none; }\n.cv-plabel__num { color: hsl(var(--accent)); }\n\n/* ============================================================\n   COMPONENT: Medallion (.cv-medallion) — optical circle icon\n   ============================================================ */\n.cv-medallion {\n  position: relative;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  border-radius: 999px;\n  color: hsl(var(--secondary));\n}\n.cv-medallion__ring {\n  position: absolute;\n  inset: 0;\n  border-radius: 999px;\n  border: 1px solid currentColor;\n  opacity: 0.35;\n}\n.cv-medallion__ring--2 { inset: 14%; opacity: 0.55; }\n.cv-medallion__ring--3 { inset: 28%; opacity: 0.8; }\n.cv-medallion__tick {\n  position: absolute;\n  width: 1px;\n  height: 7px;\n  background: currentColor;\n  top: 0;\n  left: 50%;\n  transform-origin: 50% calc(50% + 0px);\n  opacity: 0.5;\n}\n.cv-medallion__glyph {\n  position: relative;\n  z-index: 1;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n}\n\n/* ============================================================\n   COMPONENT: SpecCard (.cv-speccard)\n   ============================================================ */\n.cv-speccard {\n  background: hsl(var(--card));\n  color: hsl(var(--card-foreground));\n  border: 1px solid hsl(var(--border));\n  border-radius: var(--radius);\n  padding: 1.75rem;\n  box-shadow: var(--shadow-soft);\n  transition: box-shadow .3s ease, transform .3s ease, border-color .3s ease;\n  position: relative;\n}\n.cv-speccard:hover { box-shadow: var(--shadow-medium); border-color: hsl(var(--secondary) / .4); }\n.cv-speccard__head {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 1rem;\n  margin-bottom: 1rem;\n}\n.cv-speccard__title {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-h3);\n  letter-spacing: -0.015em;\n  color: hsl(var(--foreground));\n  margin: 0;\n}\n.cv-speccard__body { color: hsl(var(--muted-foreground)); font-size: var(--text-sm); line-height: 1.6; margin: 0; }\n.cv-speccard__divider { height: 1px; background: hsl(var(--border)); margin: 1.25rem 0; }\n.cv-speccard__accent {\n  position: absolute;\n  left: 0; top: 1.75rem; bottom: 1.75rem;\n  width: 3px;\n  background: hsl(var(--accent));\n  border-radius: 0 2px 2px 0;\n}\n<\u002Fstyle>\n\n<style>\n  body { background: hsl(var(--background)); }\n  .doc {\n    max-width: 56rem;\n    margin: 0 auto;\n    padding: clamp(2.5rem, 6vw, 6rem) clamp(1.5rem, 5vw, 3.5rem) 7rem;\n  }\n\n  /* Masthead */\n  .doc-hero {\n    background: var(--gradient-primary);\n    color: hsl(var(--primary-foreground));\n    border-radius: var(--radius-lg);\n    padding: clamp(2.5rem, 5vw, 4rem);\n    position: relative;\n    overflow: hidden;\n    box-shadow: var(--shadow-elegant);\n    margin-bottom: 4rem;\n  }\n  .doc-hero__rings {\n    position: absolute;\n    top: -30%;\n    right: -8%;\n    width: 22rem;\n    height: 22rem;\n    pointer-events: none;\n  }\n  .doc-hero__rings circle { fill: none; stroke: hsl(var(--secondary)); }\n  .doc-hero .cv-plabel { color: hsl(var(--secondary)); position: relative; }\n  .doc-hero h1 {\n    font-family: var(--font-display);\n    font-weight: 800;\n    letter-spacing: -0.035em;\n    line-height: 1.0;\n    font-size: clamp(2.75rem, 6vw, 4.25rem);\n    margin: 1.25rem 0 1.5rem;\n    position: relative;\n  }\n  .doc-hero h1 em { font-style: normal; color: hsl(var(--accent)); }\n  .doc-hero p {\n    position: relative;\n    max-width: 38rem;\n    font-size: var(--text-lg);\n    line-height: 1.6;\n    color: hsl(43 25% 94% / 0.82);\n    margin: 0;\n  }\n\n  /* Section rhythm */\n  section { margin-bottom: 3.75rem; }\n  .sec-head {\n    display: flex;\n    align-items: baseline;\n    gap: 1rem;\n    margin-bottom: 1.5rem;\n    border-bottom: 1px solid hsl(var(--border));\n    padding-bottom: 0.85rem;\n  }\n  .sec-head h2 {\n    font-family: var(--font-display);\n    font-weight: 800;\n    font-size: var(--text-h2);\n    letter-spacing: -0.025em;\n    color: hsl(var(--primary));\n    margin: 0;\n  }\n  .sec-head .idx {\n    font-family: var(--font-label);\n    font-size: var(--text-label);\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    color: hsl(var(--accent));\n  }\n\n  p.body { color: hsl(var(--foreground)); line-height: 1.7; margin: 0 0 1.1rem; }\n  p.body.muted { color: hsl(var(--muted-foreground)); }\n  .lead {\n    font-size: var(--text-lg);\n    line-height: 1.6;\n    color: hsl(var(--foreground));\n    margin: 0 0 1.5rem;\n  }\n  em.term { font-style: italic; color: hsl(var(--secondary)); font-weight: 500; }\n  code.tok {\n    font-family: var(--font-sans);\n    font-weight: 600;\n    font-size: 0.9em;\n    background: hsl(var(--primary) / 0.06);\n    color: hsl(var(--primary));\n    padding: 0.1em 0.4em;\n    border-radius: var(--radius-sm);\n    border: 1px solid hsl(var(--primary) / 0.1);\n  }\n\n  /* Callout (type note) */\n  .callout {\n    display: flex;\n    gap: 1.25rem;\n    background: hsl(var(--card));\n    border: 1px solid hsl(var(--border));\n    border-left: 3px solid hsl(var(--accent));\n    border-radius: var(--radius-md);\n    padding: 1.5rem 1.75rem;\n    box-shadow: var(--shadow-soft);\n    margin-bottom: 4rem;\n  }\n  .callout__label {\n    font-family: var(--font-label);\n    font-size: var(--text-label);\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: hsl(var(--accent));\n    flex: none;\n    padding-top: 0.15rem;\n  }\n  .callout p { margin: 0; color: hsl(var(--muted-foreground)); line-height: 1.65; }\n  .callout strong { color: hsl(var(--foreground)); font-weight: 700; }\n\n  /* Code block */\n  pre.code {\n    background: hsl(var(--primary));\n    color: hsl(43 25% 94% / 0.92);\n    border-radius: var(--radius-md);\n    padding: 1.4rem 1.6rem;\n    overflow-x: auto;\n    font-family: var(--font-sans);\n    font-size: 0.82rem;\n    line-height: 1.7;\n    box-shadow: var(--shadow-soft);\n    margin: 0 0 1.25rem;\n    -webkit-font-smoothing: auto;\n  }\n  pre.code .c-tag { color: hsl(var(--secondary)); }\n  pre.code .c-attr { color: hsl(var(--gold-bright)); }\n  pre.code .c-str { color: hsl(43 25% 94% / 0.6); }\n  pre.code .c-kw { color: hsl(var(--gold-bright)); }\n  pre.code .c-var { color: #8fd6e0; }\n\n  /* Palette table */\n  .palette { display: grid; gap: 0.5rem; }\n  .swatch-row {\n    display: grid;\n    grid-template-columns: 3rem minmax(7rem, 1fr) 6.5rem 7rem 1fr;\n    align-items: center;\n    gap: 1rem;\n    padding: 0.7rem 0.9rem;\n    background: hsl(var(--card));\n    border: 1px solid hsl(var(--border));\n    border-radius: var(--radius-md);\n  }\n  .swatch-row .chip { width: 2rem; height: 2rem; border-radius: var(--radius-sm); box-shadow: inset 0 0 0 1px hsl(var(--primary) / 0.12); }\n  .swatch-row .tok { font-family: var(--font-sans); font-weight: 700; font-size: 0.82rem; color: hsl(var(--primary)); }\n  .swatch-row .hex { font-family: var(--font-sans); font-size: 0.8rem; color: hsl(var(--muted-foreground)); font-weight: 500; }\n  .swatch-row .hsl { font-family: var(--font-sans); font-size: 0.8rem; color: hsl(var(--muted-foreground)); }\n  .swatch-row .role { font-size: 0.82rem; color: hsl(var(--foreground)); }\n  @media (max-width: 640px) {\n    .swatch-row { grid-template-columns: 2.5rem 1fr; }\n    .swatch-row .hex, .swatch-row .hsl, .swatch-row .role { display: none; }\n  }\n\n  /* Definition lists */\n  ul.spec { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.6rem; }\n  ul.spec > li {\n    padding-left: 1.4rem;\n    position: relative;\n    line-height: 1.6;\n    color: hsl(var(--foreground));\n  }\n  ul.spec > li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 0.62em;\n    width: 0.55rem; height: 2px;\n    background: hsl(var(--accent));\n  }\n  ul.spec strong { font-weight: 700; color: hsl(var(--primary)); }\n\n  /* Components table */\n  .comp-grid { display: grid; gap: 0.75rem; }\n  .comp-row {\n    display: grid;\n    grid-template-columns: 10rem 1fr;\n    gap: 1.25rem;\n    padding: 1rem 1.25rem;\n    background: hsl(var(--card));\n    border: 1px solid hsl(var(--border));\n    border-radius: var(--radius-md);\n    border-left: 3px solid hsl(var(--secondary));\n  }\n  .comp-row .name {\n    font-family: var(--font-sans);\n    font-weight: 700;\n    font-size: 0.95rem;\n    color: hsl(var(--primary));\n  }\n  .comp-row .desc { color: hsl(var(--muted-foreground)); font-size: 0.88rem; line-height: 1.55; }\n  @media (max-width: 600px) { .comp-row { grid-template-columns: 1fr; gap: 0.4rem; } }\n\n  /* Principles */\n  ol.principles { list-style: none; counter-reset: p; margin: 0; padding: 0; display: grid; gap: 1.1rem; }\n  ol.principles > li {\n    counter-increment: p;\n    display: grid;\n    grid-template-columns: 2.75rem 1fr;\n    gap: 1.25rem;\n    align-items: start;\n  }\n  ol.principles > li::before {\n    content: counter(p, decimal-leading-zero);\n    font-family: var(--font-label);\n    font-weight: 800;\n    font-size: 1.05rem;\n    color: hsl(var(--accent));\n    letter-spacing: 0.02em;\n    padding-top: 0.05rem;\n  }\n  ol.principles strong { color: hsl(var(--primary)); font-weight: 700; }\n  ol.principles .ptext { color: hsl(var(--muted-foreground)); line-height: 1.6; }\n\n  .doc-foot {\n    margin-top: 5rem;\n    padding-top: 1.5rem;\n    border-top: 1px solid hsl(var(--border));\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 1rem;\n    flex-wrap: wrap;\n  }\n  .doc-foot .cv-label { color: hsl(var(--muted-foreground)); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<main class=\"doc\">\n\n  <header class=\"doc-hero\">\n    <svg class=\"doc-hero__rings\" viewBox=\"0 0 200 200\" aria-hidden=\"true\">\n      <circle cx=\"100\" cy=\"100\" r=\"96\" stroke-width=\"0.75\" opacity=\"0.3\"><\u002Fcircle>\n      <circle cx=\"100\" cy=\"100\" r=\"74\" stroke-width=\"0.75\" opacity=\"0.45\"><\u002Fcircle>\n      <circle cx=\"100\" cy=\"100\" r=\"52\" stroke-width=\"0.75\" opacity=\"0.6\"><\u002Fcircle>\n      <circle cx=\"100\" cy=\"100\" r=\"30\" stroke-width=\"0.75\" opacity=\"0.8\"><\u002Fcircle>\n    <\u002Fsvg>\n    <span class=\"cv-plabel\"><span class=\"cv-plabel__rule\"><\u002Fspan>Meridian Precision<\u002Fspan>\n    <h1>Classic Visions<br><em>Design System<\u002Fem><\u002Fh1>\n    <p>The visual language for Classic Visions, a wholesale optical supplier in Barbados. Precision treated as a <em class=\"term\">felt<\u002Fem> quality — the weight of the type, the discipline of a measured circle, the silence of white space.<\u002Fp>\n  <\u002Fheader>\n\n  <div class=\"callout\">\n    <span class=\"callout__label\">Type Note<\u002Fspan>\n    <p>The system is <strong>one family only<\u002Fstrong> — Plus Jakarta Sans, web-optimised from Google Fonts. It carries monumental headlines (800, tight tracking), calm body copy, and uppercase wide-tracked precision labels. There is <strong>no serif and no monospace<\u002Fstrong> anywhere.<\u002Fp>\n  <\u002Fdiv>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"idx\">01<\u002Fspan><h2>Using this system<\u002Fh2><\u002Fdiv>\n    <p class=\"body\">Consuming pages load <strong>one stylesheet<\u002Fstrong> and <strong>one bundle<\u002Fstrong>:<\u002Fp>\n    <pre class=\"code\"><span class=\"c-tag\">&lt;link<\u002Fspan> <span class=\"c-attr\">rel<\u002Fspan>=<span class=\"c-str\">\"stylesheet\"<\u002Fspan> <span class=\"c-attr\">href<\u002Fspan>=<span class=\"c-str\">\"styles.css\"<\u002Fspan> <span class=\"c-tag\">/&gt;<\u002Fspan>\n<span class=\"c-tag\">&lt;script<\u002Fspan> <span class=\"c-attr\">src<\u002Fspan>=<span class=\"c-str\">\"react@18.3.1/react.development.js\"<\u002Fspan><span class=\"c-tag\">&gt;&lt;/script&gt;<\u002Fspan>\n<span class=\"c-tag\">&lt;script<\u002Fspan> <span class=\"c-attr\">src<\u002Fspan>=<span class=\"c-str\">\"react-dom@18.3.1/react-dom.development.js\"<\u002Fspan><span class=\"c-tag\">&gt;&lt;/script&gt;<\u002Fspan>\n<span class=\"c-tag\">&lt;script<\u002Fspan> <span class=\"c-attr\">src<\u002Fspan>=<span class=\"c-str\">\"_ds_bundle.js\"<\u002Fspan><span class=\"c-tag\">&gt;&lt;/script&gt;<\u002Fspan><\u002Fpre>\n    <p class=\"body\">Components are read off the global namespace:<\u002Fp>\n    <pre class=\"code\"><span class=\"c-kw\">const<\u002Fspan> { Button, Badge, PrecisionLabel, Medallion, SpecCard } =\n  <span class=\"c-var\">window<\u002Fspan>.ClassicVisionsDesignSystem_e30914;<\u002Fpre>\n    <p class=\"body muted\"><code class=\"tok\">styles.css<\u002Fcode> self-imports the Google fonts, so no separate font link is needed.<\u002Fp>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"idx\">02<\u002Fspan><h2>Palette<\u002Fh2><\u002Fdiv>\n    <div class=\"palette\">\n      <div class=\"swatch-row\"><span class=\"chip\" style=\"background:#0B1E35\"><\u002Fspan><span class=\"tok\">--primary<\u002Fspan><span class=\"hex\">#0B1E35<\u002Fspan><span class=\"hsl\">213 66% 13%<\u002Fspan><span class=\"role\">Ocean navy — the field, primary surfaces, headlines<\u002Fspan><\u002Fdiv>\n      <div class=\"swatch-row\"><span class=\"chip\" style=\"background:#1A8A9C\"><\u002Fspan><span class=\"tok\">--secondary<\u002Fspan><span class=\"hex\">#1A8A9C<\u002Fspan><span class=\"hsl\">188 71% 36%<\u002Fspan><span class=\"role\">Meridian teal — the signal color (links, focus, performance)<\u002Fspan><\u002Fdiv>\n      <div class=\"swatch-row\"><span class=\"chip\" style=\"background:#C89130\"><\u002Fspan><span class=\"tok\">--accent<\u002Fspan><span class=\"hex\">#C89130<\u002Fspan><span class=\"hsl\">38 61% 49%<\u002Fspan><span class=\"role\">Structural gold — hairline rules, eyebrows, the hero CTA<\u002Fspan><\u002Fdiv>\n      <div class=\"swatch-row\"><span class=\"chip\" style=\"background:#F4F2ED\"><\u002Fspan><span class=\"tok\">--background<\u002Fspan><span class=\"hex\">#F4F2ED<\u002Fspan><span class=\"hsl\">43 25% 94%<\u002Fspan><span class=\"role\">Off-white linen — the light field<\u002Fspan><\u002Fdiv>\n      <div class=\"swatch-row\"><span class=\"chip\" style=\"background:hsl(140 45% 40%)\"><\u002Fspan><span class=\"tok\">--success<\u002Fspan><span class=\"hex\">—<\u002Fspan><span class=\"hsl\">140 45% 40%<\u002Fspan><span class=\"role\">Positive state<\u002Fspan><\u002Fdiv>\n      <div class=\"swatch-row\"><span class=\"chip\" style=\"background:hsl(0 84% 60%)\"><\u002Fspan><span class=\"tok\">--destructive<\u002Fspan><span class=\"hex\">—<\u002Fspan><span class=\"hsl\">0 84% 60%<\u002Fspan><span class=\"role\">Errors / removal<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"body muted\" style=\"margin-top:1.25rem\">Convenience hex aliases also exist: <code class=\"tok\">--navy<\u002Fcode>, <code class=\"tok\">--teal<\u002Fcode>, <code class=\"tok\">--gold<\u002Fcode>, <code class=\"tok\">--linen<\u002Fcode>, <code class=\"tok\">--paper<\u002Fcode>. All semantic colors are stored as HSL channels for <code class=\"tok\">hsl(var(--token) / alpha)<\u002Fcode> use.<\u002Fp>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"idx\">03<\u002Fspan><h2>Type<\u002Fh2><\u002Fdiv>\n    <ul class=\"spec\">\n      <li><strong>Display &amp; body<\u002Fstrong> — Plus Jakarta Sans. Headlines: weight 800, letter-spacing −0.03em, line-height ~1.0. Use <code class=\"tok\">.cv-display<\u002Fcode>, <code class=\"tok\">.cv-h1<\u002Fcode>, <code class=\"tok\">.cv-h2<\u002Fcode>, <code class=\"tok\">.cv-h3<\u002Fcode>, <code class=\"tok\">.cv-lead<\u002Fcode>.<\u002Fli>\n      <li><strong>Labels<\u002Fstrong> — Plus Jakarta Sans caps: uppercase, 700 weight, letter-spacing 0.18em. Use <code class=\"tok\">.cv-label<\u002Fcode> or the <code class=\"tok\">PrecisionLabel<\u002Fcode> component — the signature plaque detail.<\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"idx\">04<\u002Fspan><h2>Spacing, radius, elevation<\u002Fh2><\u002Fdiv>\n    <ul class=\"spec\">\n      <li><strong>Radius<\u002Fstrong> — <code class=\"tok\">--radius<\u002Fcode> 0.75rem (lg); md 0.5rem; sm 0.375rem; pills are fully round.<\u002Fli>\n      <li><strong>Shadows<\u002Fstrong> — navy-tinted and soft: <code class=\"tok\">.cv-shadow-soft<\u002Fcode> / <code class=\"tok\">-medium<\u002Fcode> / <code class=\"tok\">-elegant<\u002Fcode>, plus <code class=\"tok\">.cv-shadow-glow<\u002Fcode> (gold) for hero emphasis.<\u002Fli>\n      <li><strong>Spacing<\u002Fstrong> — 4px rhythm via <code class=\"tok\">--space-1 … --space-24<\u002Fcode>.<\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"idx\">05<\u002Fspan><h2>Components<\u002Fh2><\u002Fdiv>\n    <div class=\"comp-grid\">\n      <div class=\"comp-row\"><span class=\"name\">Button<\u002Fspan><span class=\"desc\">CTA. Variants: primary (navy), secondary (teal), outline, ghost, hero (gold gradient), hero-outline. Sizes sm / md / lg / icon.<\u002Fspan><\u002Fdiv>\n      <div class=\"comp-row\"><span class=\"name\">Badge<\u002Fspan><span class=\"desc\">Uppercase caps status / performance pill. Variants: navy, teal, gold, success, outline, muted.<\u002Fspan><\u002Fdiv>\n      <div class=\"comp-row\"><span class=\"name\">PrecisionLabel<\u002Fspan><span class=\"desc\">Signature kicker: uppercase caps with a leading gold rule (or an index number).<\u002Fspan><\u002Fdiv>\n      <div class=\"comp-row\"><span class=\"name\">Medallion<\u002Fspan><span class=\"desc\">Optical-instrument icon frame — concentric hairline rings + calibrated tick marks around a glyph.<\u002Fspan><\u002Fdiv>\n      <div class=\"comp-row\"><span class=\"name\">SpecCard<\u002Fspan><span class=\"desc\">Product / technology card with optional gold accent bar, eyebrow, title, body, footer.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"body muted\" style=\"margin-top:1.25rem\">Plain-CSS helpers (no JS needed): <code class=\"tok\">.cv-card<\u002Fcode>, <code class=\"tok\">.cv-rule<\u002Fcode>, <code class=\"tok\">.cv-text-gradient<\u002Fcode>, <code class=\"tok\">.cv-bg-navy<\u002Fcode>, <code class=\"tok\">.cv-bg-gradient-accent<\u002Fcode>, etc.<\u002Fp>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"idx\">06<\u002Fspan><h2>Brand assets<\u002Fh2><\u002Fdiv>\n    <p class=\"body\"><code class=\"tok\">assets/logo/<\u002Fcode> holds the eye/lens \"swoosh\" mark in four treatments: <code class=\"tok\">logo_navy.svg<\u002Fcode>, <code class=\"tok\">logo_linen.svg<\u002Fcode>, <code class=\"tok\">logo_teal.svg<\u002Fcode>, <code class=\"tok\">logo_gold.svg<\u002Fcode>. Imagery and optical illustrations live in <code class=\"tok\">src/assets/<\u002Fcode> and <code class=\"tok\">assets/illustrations/<\u002Fcode>.<\u002Fp>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"idx\">07<\u002Fspan><h2>Composition principles<\u002Fh2><\u002Fdiv>\n    <ol class=\"principles\">\n      <li><span class=\"ptext\"><strong>Navy is material, not background.<\u002Fstrong> Let large fields of it carry weight.<\u002Fspan><\u002Fli>\n      <li><span class=\"ptext\"><strong>Gold is structural.<\u002Fstrong> A hairline rule, a single accent bar — never decoration.<\u002Fspan><\u002Fli>\n      <li><span class=\"ptext\"><strong>Labels are objects.<\u002Fstrong> Information reads as designed plaques (wide-tracked caps), not prose.<\u002Fspan><\u002Fli>\n      <li><span class=\"ptext\"><strong>Circles vs. rectangles.<\u002Fstrong> Optical medallions (organic, scientific) tension against strict column / card structure (order, trust).<\u002Fspan><\u002Fli>\n      <li><span class=\"ptext\"><strong>Body copy stays quiet.<\u002Fstrong> It is subordinate; the headline and the label lead the eye.<\u002Fspan><\u002Fli>\n    <\u002Fol>\n  <\u002Fsection>\n\n  <footer class=\"doc-foot\">\n    <span class=\"cv-label\">Classic Visions · Meridian Precision<\u002Fspan>\n    <span class=\"cv-label\">Barbados<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fmain>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
