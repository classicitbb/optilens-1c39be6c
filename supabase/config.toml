  [functions.innovations-sync]
    verify_jwt = false
  # On-demand CV Web -> office gateway. Browser requests authenticate in code;
  # the OptiLens agent uses a scoped x-api-key, so the platform JWT gate is off.
  [functions.live-data-gateway]
    verify_jwt = false
  # The MCP runtime performs its own OAuth 2.1 bearer validation and must be
  # allowed to return the protocol's WWW-Authenticate discovery challenge.
  [functions.mcp]
    verify_jwt = false
  # Scotia eCom+ (IPG Connect) hosted-payment helper. Public preflight/CORS is
  # handled in code; the buyer's browser calls "prepare". Set verify_jwt=true
  # before production so only authenticated checkout sessions can request a hash.
  [functions.scotia-payment]
    verify_jwt = false
