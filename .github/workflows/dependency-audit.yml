name: Dependency Audit

on:
  pull_request:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Use npm 10
        run: npm install --global npm@10

      - name: Install dependencies
        run: ./scripts/npm-clean.sh ci

      - name: Enforce vulnerability policy
        run: ./scripts/npm-clean.sh run security:audit
