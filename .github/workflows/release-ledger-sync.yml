name: Release Ledger Sync Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-ledger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify changelog/release notes/wiki sync
        run: npm run qa:release-ledger
