name: Lockfile Policy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lockfile-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Pin npm 10
        run: npm install --global npm@10.9.4
      - name: Verify lockfile policy
        run: ./scripts/npm-clean.sh run qa:lockfiles
