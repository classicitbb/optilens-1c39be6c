name: Lockfile Policy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lockfile-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Verify lockfile policy
        run: npm run qa:lockfiles
