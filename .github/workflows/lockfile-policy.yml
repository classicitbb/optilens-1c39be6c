name: Lockfile Policy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lockfile-policy:
    name: Lockfile policy (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Use npm 10
        run: npm install --global npm@10
      - name: Verify lockfile policy
        run: ./scripts/npm-clean.sh run qa:lockfiles
