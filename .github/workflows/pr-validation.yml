name: PR Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-validation:
    name: Lint, Test, Typecheck, Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Use npm 10
        run: npm install --global npm@10

      - name: Install dependencies
        run: ./scripts/npm-clean.sh ci

      - name: Run lint
        run: ./scripts/npm-clean.sh run lint

      - name: Run test
        run: ./scripts/npm-clean.sh run test

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run build
        run: ./scripts/npm-clean.sh run build

  pr-release-ledger-check:
    name: Release ledger sync check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Use npm 10
        run: npm install --global npm@10

      - name: Install dependencies
        run: ./scripts/npm-clean.sh ci

      - name: Run PR release ledger checks
        run: ./scripts/npm-clean.sh run qa:pr-checks
